global:
  resolve_timeout: 5m

route:
  receiver: default-email
  group_by: [alertname, job]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default-email
    email_configs:
      - to: ${ALERT_EMAIL_TO}
        from: ${ALERT_EMAIL_FROM}
        smarthost: ${ALERT_SMTP_HOST}:${ALERT_SMTP_PORT}
        auth_username: ${ALERT_SMTP_USERNAME}
        auth_password: ${ALERT_SMTP_PASSWORD}
        require_tls: true
