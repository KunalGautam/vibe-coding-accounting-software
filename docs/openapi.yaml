        customer_id:
          type: string
          format: uuid
        invoice_number:
          type: string
          example: INV-001
        issue_date:
          type: string
          format: date
        due_date:
          type: string
          format: date
        currency:
          type: string
          example: INR
        tax_inclusive:
          type: boolean
        accounts_receivable_id:
          type: string
          format: uuid
        pdf_attachment_id:
          type: string
          format: uuid
          nullable: true
        lines:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/InvoiceLineInput'
    InvoiceLineInput:
      type: object
      required: [description, unit_price_minor, income_account_id]
