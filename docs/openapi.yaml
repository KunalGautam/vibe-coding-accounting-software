            $ref: '#/components/schemas/InvoiceLine'
    InvoiceLine:
      type: object
      properties:
        id:
          type: string
          format: uuid
        description:
          type: string
        quantity_millis:
          type: integer
          format: int64
          example: 1000
        unit_price_minor:
          type: integer
          format: int64
          example: 10000
        line_subtotal_minor:
          type: integer
          format: int64
        tax_amount_minor:
          type: integer
          format: int64
        line_total_minor:
          type: integer
          format: int64
        income_account_id:
          type: string
          format: uuid
        tax_rate_id:
          type: string
          format: uuid
          nullable: true
        tax_group_id:
          type: string
          format: uuid
          nullable: true
    CreateInvoiceRequest:
      type: object
