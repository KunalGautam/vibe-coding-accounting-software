        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        invoice_number:
          type: string
        issue_date:
          type: string
          format: date-time
        due_date:
          type: string
          format: date-time
        status:
          type: string
          enum: [draft, posted, paid, void]
        currency:
          type: string
          example: INR
        tax_inclusive:
          type: boolean
        subtotal_minor:
          type: integer
          format: int64
          example: 10000
        tax_total_minor:
          type: integer
          format: int64
          example: 1800
        total_minor:
          type: integer
          format: int64
          example: 11800
        accounts_receivable_id:
          type: string
          format: uuid
        pdf_attachment_id:
          type: string
          format: uuid
          nullable: true
        journal_transaction_id:
          type: string
          format: uuid
          nullable: true
        lines:
