          type: integer
          format: int64
          description: Fixed professional tax deduction in minor currency units.
          example: 20000
        tds_rate_bps:
          type: integer
          format: int64
          description: Optional flat TDS rate in basis points used when tds_minor is zero. This is a configurable starter rule, not a statutory slab engine.
          example: 1000
        tds_minor:
          type: integer
          format: int64
          description: Fixed TDS deduction in minor currency units. Takes precedence over tds_rate_bps when provided.
          example: 150000
        tds_annual_income_minor:
          type: integer
          format: int64
          description: Annual taxable income used for configurable progressive TDS slab calculation when fixed TDS and flat TDS rate are not provided.
          example: 90000000
        tds_periods_in_year:
          type: integer
          format: int64
          description: Number of payroll periods used to convert annual slab tax into per-period TDS. Zero uses the API default of 12.
          example: 12
        tds_slabs:
          type: array
          description: Configurable progressive TDS slabs. This is policy data supplied by admins, not hardcoded statutory logic.
          items:
            $ref: '#/components/schemas/IndiaTDSSlabInput'
