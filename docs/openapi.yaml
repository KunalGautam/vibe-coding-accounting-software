openapi: 3.0.3
info:
  title: Accounting Platform API
  version: 0.1.0
  description: >
    REST API for the AbhashTech multi-tenant accounting and bookkeeping
    platform with double-entry ledger, invoicing, expenses, payroll, tax,
    reporting, imports, backups, and investment accounting.
  contact:
    name: AbhashTech Accounting
    url: https://accounting.abhashtech.com
servers:
  - url: http://localhost:8080/api/v1
    description: Local development
  - url: https://api.accounting.abhashtech.com/api/v1
    description: Production placeholder
externalDocs:
  description: REST API and Swagger documentation workflow
  url: ./API_DOCUMENTATION.md
tags:
  - name: Auth
  - name: Organizations
  - name: Accounts
  - name: Ledger
  - name: Invoices
  - name: Expenses
  - name: Attachments
  - name: Payroll
  - name: Tax
  - name: Reports
  - name: Imports
  - name: Investments
  - name: System
security:
  - bearerAuth: []
paths:
  /bootstrap/first-admin:
    post:
      tags: [System]
      security: []
      summary: Create the first admin user and organization
      description: Only succeeds when no users exist in the system.
      operationId: bootstrapFirstAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapFirstAdminRequest'
      responses:
        '201':
          description: Bootstrap completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapFirstAdminResponse'
        default:
          $ref: '#/components/responses/Error'
  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Authenticate a user
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        default:
          $ref: '#/components/responses/Error'
  /auth/register:
    post:
      tags: [Auth]
      security: []
      summary: Register a new organization and owner account
      description: Disabled by default. Requires SELF_SERVICE_REGISTRATION_ENABLED=true.
      operationId: registerOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapFirstAdminRequest'
      responses:
        '201':
          description: Organization registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapFirstAdminResponse'
        default:
          $ref: '#/components/responses/Error'
  /auth/refresh:
    post:
      tags: [Auth]
      security: []
      summary: Refresh an access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        default:
          $ref: '#/components/responses/Error'
  /auth/logout:
    post:
      tags: [Auth]
      security: []
      summary: Revoke a refresh token
      description: Revokes the supplied refresh token so it cannot be used again.
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Refresh token revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeSessionResponse'
        default:
          $ref: '#/components/responses/Error'
  /auth/sessions/revoke-all:
    post:
      tags: [Auth]
      summary: Revoke all sessions for the current user
      description: Revokes every active refresh token belonging to the authenticated user.
      operationId: revokeAllSessions
      responses:
        '200':
          description: Sessions revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeAllSessionsResponse'
        default:
          $ref: '#/components/responses/Error'
  /auth/me:
    get:
      tags: [Auth]
      summary: Get the current authenticated user profile
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserProfile'
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags: [Auth]
      summary: Update the current authenticated user profile
      operationId: updateCurrentUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCurrentUserRequest'
      responses:
        '200':
          description: Updated current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserProfile'
        default:
          $ref: '#/components/responses/Error'
  /auth/password/change:
    post:
      tags: [Auth]
      summary: Change the current user's password
      description: Verifies the current password, stores the new password hash, and revokes active refresh-token sessions.
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePasswordResponse'
        default:
          $ref: '#/components/responses/Error'
  /auth/mfa/setup:
    post:
      tags: [Auth]
      summary: Generate MFA setup secret
      description: Generates or rotates a TOTP MFA secret for the authenticated user and returns an otpauth URI for authenticator apps.
      operationId: setupMFA
      responses:
        '200':
          description: MFA setup secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFASetupResponse'
        default:
          $ref: '#/components/responses/Error'
  /auth/mfa/enable:
    post:
      tags: [Auth]
      summary: Enable MFA for the current user
      operationId: enableMFA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFACodeRequest'
      responses:
        '200':
          description: MFA enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFAStatusResponse'
        default:
          $ref: '#/components/responses/Error'
  /auth/mfa/disable:
    post:
      tags: [Auth]
      summary: Disable MFA for the current user
      operationId: disableMFA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFACodeRequest'
      responses:
        '200':
          description: MFA disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFAStatusResponse'
        default:
          $ref: '#/components/responses/Error'
  /auth/mfa/recovery-codes/regenerate:
    post:
      tags: [Auth]
      summary: Regenerate one-time MFA recovery codes
      description: Requires a current authenticator code. Old recovery codes are invalidated and the new codes are returned once.
      operationId: regenerateMFARecoveryCodes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFACodeRequest'
      responses:
        '200':
          description: Recovery codes regenerated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFAStatusResponse'
        default:
          $ref: '#/components/responses/Error'
  /auth/password-reset/request:
    post:
      tags: [Auth]
      security: []
      summary: Request a password reset token
      operationId: requestPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestPasswordResetRequest'
      responses:
        '200':
          description: Password reset requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestPasswordResetResponse'
        default:
          $ref: '#/components/responses/Error'
  /auth/password-reset/confirm:
    post:
      tags: [Auth]
      security: []
      summary: Confirm a password reset
      operationId: confirmPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmPasswordResetRequest'
      responses:
        '200':
          description: Password reset confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmPasswordResetResponse'
        default:
          $ref: '#/components/responses/Error'
  /organizations:
    get:
      tags: [Organizations]
      summary: List organizations available to the current user
      operationId: listOrganizations
      responses:
        '200':
          description: Organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Organizations]
      summary: Create an organization
      operationId: createOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
      responses:
        '201':
          description: Created organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}/accounts:
    get:
      tags: [Accounts]
      summary: List chart of accounts
      operationId: listAccounts
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        '200':
          description: Accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Accounts]
      summary: Create an account
      operationId: createAccount
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '201':
          description: Created account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}/ledger/transactions:
    get:
      tags: [Ledger]
      summary: List journal transactions
      operationId: listJournalTransactions
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: Journal transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JournalTransaction'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Ledger]
      summary: Post a balanced journal transaction
      operationId: postJournalTransaction
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostJournalTransactionRequest'
      responses:
        '201':
          description: Posted journal transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalTransaction'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}/ledger/accounts/{accountId}/register:
    get:
      tags: [Ledger]
      summary: Get account register
      operationId: getAccountRegister
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/AccountId'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: Account register
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LedgerSplit'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}/reports/account-drilldown:
    get:
      tags: [Reports, Ledger]
      summary: Drill into posted ledger activity for a report account row
      description: Returns period ledger splits for one account with opening and running balances using the account's normal balance convention.
      operationId: getAccountDrilldown
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - name: account_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: Account report drilldown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDrilldownReport'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}/customers:
    get:
      tags: [Invoices]
      summary: List customers
      operationId: listCustomers
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        '200':
          description: Customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Invoices]
      summary: Create a customer
      operationId: createCustomer
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '201':
          description: Created customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}/invoices:
    get:
      tags: [Invoices]
      summary: List invoices
      operationId: listInvoices
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        '200':
          description: Invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invoice'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Invoices]
      summary: Create an invoice
      operationId: createInvoice
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
      responses:
        '201':
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}/invoices/{invoiceId}:
    put:
      tags: [Invoices]
      summary: Replace a draft invoice
      description: Replaces editable draft invoice fields and lines, recalculating tax totals. Posted, paid, or void invoices are immutable and must be adjusted through accounting workflows instead.
      operationId: updateInvoice
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
      responses:
        '200':
          description: Updated draft invoice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}/invoices/{invoiceId}/post:
    post:
      tags: [Invoices, Ledger]
      summary: Post an invoice to the general ledger
      operationId: postInvoice
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Posted invoice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}/recurring-invoices:
    get:
      tags: [Invoices]
      summary: List recurring invoice templates
      operationId: listRecurringInvoices
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        '200':
          description: Recurring invoice templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecurringInvoiceTemplate'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Invoices]
      summary: Create a recurring invoice template
      operationId: createRecurringInvoice
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecurringInvoiceTemplateRequest'
      responses:
        '201':
          description: Created recurring invoice template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringInvoiceTemplate'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}/recurring-invoices/generate-due:
    post:
      tags: [Invoices]
      summary: Generate due recurring invoices as drafts
      operationId: generateDueRecurringInvoices
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - name: as_of
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '201':
          description: Generated draft invoices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateDueRecurringInvoicesResponse'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}/invoices/{invoiceId}/payments:
    get:
      tags: [Invoices]
      summary: List customer payments applied to an invoice
      operationId: listCustomerPayments
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Customer payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerPayment'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Invoices, Ledger]
      summary: Record a customer payment against an invoice
      operationId: recordCustomerPayment
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordPaymentRequest'
      responses:
        '201':
          description: Recorded customer payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerPayment'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}/estimates:
    get:
      tags: [Invoices]
      summary: List estimates
      operationId: listEstimates
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        '200':
          description: Estimates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Estimate'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Invoices]
      summary: Create an estimate
      operationId: createEstimate
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEstimateRequest'
      responses:
        '201':
          description: Created estimate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Estimate'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}/estimates/{estimateId}/convert-to-invoice:
    post:
      tags: [Invoices]
      summary: Convert an estimate into a draft invoice
      operationId: convertEstimateToInvoice
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - name: estimateId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertEstimateToInvoiceRequest'
      responses:
        '201':
          description: Draft invoice created from estimate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}/estimates/{estimateId}/status:
    post:
      tags: [Invoices]
      summary: Update an estimate lifecycle status
      operationId: updateEstimateStatus
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - name: estimateId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEstimateStatusRequest'
      responses:
        '200':
          description: Updated estimate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Estimate'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}/credit-notes:
    get:
      tags: [Invoices]
      summary: List credit notes
      operationId: listCreditNotes
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        '200':
          description: Credit notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CreditNote'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Invoices]
      summary: Create a credit note
      operationId: createCreditNote
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCreditNoteRequest'
      responses:
        '201':
          description: Created credit note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditNote'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}/credit-notes/{creditNoteId}/post:
    post:
      tags: [Invoices, Ledger]
      summary: Post a credit note to the general ledger
      operationId: postCreditNote
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - name: creditNoteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Posted credit note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditNote'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}/attachments:
    get:
      tags: [Attachments]
      summary: List attachment metadata records
      operationId: listAttachments
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        '200':
          description: Attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attachment'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Attachments]
      summary: Create an attachment metadata record
      description: Stores metadata and storage location for a file that was uploaded or generated by an external storage workflow.
      operationId: createAttachment
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAttachmentRequest'
      responses:
        '201':
          description: Created attachment metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
        default:
          $ref: '#/components/responses/Error'
  /organizations/{organizationId}/attachments/upload:
    post:
      tags: [Attachments]
      summary: Upload a local attachment file
      description: Creates an attachment metadata record and stores the uploaded binary using the configured local attachment storage path.
      operationId: uploadAttachment
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
