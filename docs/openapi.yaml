    CloseFiscalYearRequest:
      type: object
      required: [fiscal_year_start, fiscal_year_end, retained_earnings_account_id]
      properties:
        fiscal_year_start:
          type: string
          format: date
        fiscal_year_end:
          type: string
          format: date
        retained_earnings_account_id:
          type: string
          format: uuid
    AuditLog:
      type: object
      required: [id, entity_type, entity_id, action, created_at]
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        actor_user_id:
          type: string
          format: uuid
        entity_type:
          type: string
          example: invoice
        entity_id:
          type: string
          format: uuid
        action:
          type: string
          example: post
        before_json:
          type: string
        after_json:
          type: string
        ip_address:
          type: string
        user_agent:
          type: string
        created_at:
          type: string
          format: date-time
    OrganizationUser:
      type: object
      required: [user_id, organization_id, name, email, role, is_active]
      properties:
        user_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, accountant, bookkeeper, payroll_manager, viewer, employee_self_service]
        is_active:
          type: boolean
        invite_email_sent:
          type: boolean
          description: True when an invitation email was sent for this create-user response.
        invite_email_error:
          type: string
          description: Email delivery error when invitation sending was attempted but failed.
    CreateOrganizationUserRequest:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 12
        role:
          type: string
          enum: [admin, accountant, bookkeeper, payroll_manager, viewer, employee_self_service]
    UpdateOrganizationUserRequest:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [admin, accountant, bookkeeper, payroll_manager, viewer, employee_self_service]
        is_active:
          type: boolean
    ReportRow:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        account_code:
          type: string
        account_name:
          type: string
        account_type:
          type: string
          enum: [asset, liability, equity, income, expense]
        debit_minor:
          type: integer
          format: int64
        credit_minor:
          type: integer
          format: int64
        balance_minor:
          type: integer
          format: int64
    ImportJob:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, processing, completed, failed]
    BankStatementImport:
      type: object
      required: [id, organization_id, account_id, format, status, line_count]
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        file_name:
          type: string
        format:
          type: string
          example: csv
        status:
          type: string
          enum: [queued, completed, failed]
        line_count:
          type: integer
        error_message:
          type: string
        lines:
          type: array
          items:
            $ref: '#/components/schemas/BankStatementLine'
    BankStatementLine:
      type: object
      required: [id, organization_id, account_id, posted_date, amount_minor, is_duplicate]
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        posted_date:
          type: string
          format: date-time
        description:
          type: string
        amount_minor:
          type: integer
          format: int64
        reference:
          type: string
        matched_split_id:
          type: string
          format: uuid
          nullable: true
        matched_at:
          type: string
          format: date-time
          nullable: true
        is_duplicate:
          type: boolean
          description: True when this line matches an earlier imported statement-line fingerprint for the same account.
        duplicate_of_id:
          type: string
          format: uuid
          nullable: true
          description: Earlier statement line this duplicate candidate matched, when known.
    ImportBankStatementRequest:
      type: object
      required: [account_id, lines]
      properties:
        account_id:
          type: string
          format: uuid
        file_name:
          type: string
        format:
          type: string
          example: csv
        lines:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ImportBankStatementLineRequest'
    ImportBankStatementLineRequest:
      type: object
      required: [posted_date]
      properties:
        posted_date:
          type: string
          format: date
        description:
          type: string
        amount_minor:
          type: integer
          format: int64
        reference:
          type: string
    ImportQIFBankStatementRequest:
      type: object
      required: [account_id, qif_content]
      properties:
        account_id:
          type: string
          format: uuid
        file_name:
          type: string
          example: bank-statement.qif
        qif_content:
          type: string
          description: Raw QIF bank statement text. Supports common D, T, P, M, N, and L fields separated by caret records.
          example: |
            !Type:Bank
            D13/07/2026
            T1250.00
            PClient receipt
            NUPI-123
            ^
    ImportOFXBankStatementRequest:
      type: object
      required: [account_id, ofx_content]
      properties:
        account_id:
          type: string
          format: uuid
        file_name:
          type: string
          example: bank-statement.ofx
        ofx_content:
          type: string
          description: Raw OFX bank statement text. Supports common STMTTRN records with DTPOSTED, TRNAMT, NAME, MEMO, and FITID fields.
          example: |
            <OFX>
            <STMTTRN>
            <DTPOSTED>20260713
            <TRNAMT>1250.00
            <FITID>OFX-123
            <NAME>Client receipt
            </STMTTRN>
            </OFX>
    MatchBankStatementLineRequest:
      type: object
      required: [ledger_split_id]
      properties:
        ledger_split_id:
          type: string
          format: uuid
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
