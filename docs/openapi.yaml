        description:
          type: string
        quantity_millis:
          type: integer
          format: int64
          example: 1000
        unit_price_minor:
          type: integer
          format: int64
          example: 10000
        income_account_id:
          type: string
          format: uuid
        tax_rate_id:
          type: string
          format: uuid
          nullable: true
        tax_group_id:
          type: string
          format: uuid
          nullable: true
    RecurringInvoiceTemplate:
