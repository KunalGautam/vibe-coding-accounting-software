components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FromDate:
      name: from
      in: query
      required: false
      schema:
        type: string
        format: date
    ToDate:
      name: to
      in: query
      required: false
      schema:
        type: string
        format: date
    AsOfDate:
      name: as_of
      in: query
      required: true
      schema:
        type: string
        format: date
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: validation_error
            message:
              type: string
              example: Request validation failed
            details:
              type: array
              items:
                type: object
                additionalProperties: true
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        mfa_code:
          type: string
          description: Required when MFA is enabled for the user.
    BootstrapFirstAdminRequest:
      type: object
      required: [organization_name, admin_name, admin_email, admin_password]
      properties:
        organization_name:
          type: string
          example: Acme India
        admin_name:
          type: string
          example: Admin User
        admin_email:
          type: string
          format: email
        admin_password:
          type: string
          format: password
          minLength: 12
        base_currency:
          type: string
          example: INR
        country_code:
          type: string
          example: IN
        seed_india_defaults:
          type: boolean
          default: true
    BootstrapFirstAdminResponse:
      type: object
      properties:
        organization:
          $ref: '#/components/schemas/Organization'
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
              format: email
            name:
              type: string
            is_active:
              type: boolean
        membership:
          type: object
          properties:
            organization_id:
              type: string
              format: uuid
            user_id:
              type: string
              format: uuid
            role:
              type: string
        india_seed:
          $ref: '#/components/schemas/IndiaSeedResult'
    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    RevokeSessionResponse:
      type: object
      required: [revoked]
      properties:
        revoked:
          type: boolean
    RevokeAllSessionsResponse:
      type: object
      required: [revoked, revoked_count]
      properties:
        revoked:
          type: boolean
        revoked_count:
          type: integer
    CurrentUserProfile:
      type: object
      required: [id, email, name, mfa_enabled, is_active, organization_roles]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        mfa_enabled:
          type: boolean
        is_active:
          type: boolean
        organization_roles:
          type: object
          additionalProperties:
            type: string
            enum: [admin, accountant, bookkeeper, payroll_manager, viewer, employee_self_service]
    UpdateCurrentUserRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          format: password
        new_password:
          type: string
          format: password
          minLength: 12
    ChangePasswordResponse:
      type: object
      required: [changed, sessions_revoked]
      properties:
        changed:
          type: boolean
        sessions_revoked:
          type: boolean
    MFASetupResponse:
      type: object
      required: [secret, otpauth_url, mfa_enabled]
      properties:
        secret:
          type: string
        otpauth_url:
          type: string
        mfa_enabled:
          type: boolean
    MFACodeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 6
          description: Current 6-digit authenticator code, or a one-time recovery code where supported.
    MFAStatusResponse:
      type: object
      required: [mfa_enabled]
      properties:
        mfa_enabled:
          type: boolean
        recovery_codes:
          type: array
          description: One-time recovery codes returned only immediately after enabling MFA or regenerating codes.
          items:
            type: string
    RequestPasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    RequestPasswordResetResponse:
      type: object
      required: [requested, email_sent]
      properties:
        requested:
          type: boolean
        email_sent:
          type: boolean
          description: True when the reset instructions were sent through configured email delivery.
        reset_token:
          type: string
          description: Development/staging reset token. Omitted when email delivery is configured and token exposure is disabled.
        reset_token_expires_at:
          type: string
          format: date-time
    ConfirmPasswordResetRequest:
      type: object
      required: [reset_token, new_password]
      properties:
        reset_token:
          type: string
        new_password:
          type: string
          minLength: 12
    ConfirmPasswordResetResponse:
      type: object
      required: [reset]
      properties:
        reset:
          type: boolean
    AuthTokenResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 900
    Organization:
      type: object
      required: [id, name, base_currency, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        base_currency:
          type: string
          example: USD
        created_at:
          type: string
          format: date-time
    CreateOrganizationRequest:
      type: object
      required: [name, base_currency]
      properties:
        name:
          type: string
        base_currency:
          type: string
          minLength: 3
          maxLength: 3
    OrganizationDataExport:
      type: object
      required: [exported_at, organization]
      additionalProperties: true
      properties:
        exported_at:
          type: string
          format: date-time
        organization:
          $ref: '#/components/schemas/Organization'
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/Account'
        journal_transactions:
          type: array
          items:
            $ref: '#/components/schemas/JournalTransaction'
        audit_logs:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
        invoices:
          type: array
          items:
            $ref: '#/components/schemas/Invoice'
        expenses:
          type: array
          items:
            $ref: '#/components/schemas/Expense'
        tax_rates:
          type: array
          items:
            $ref: '#/components/schemas/TaxRate'
    BackupSnapshot:
      type: object
      required: [id, organization_id, file_name, storage_path, size_bytes, sha256, status]
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        file_name:
          type: string
        storage_path:
          type: string
        size_bytes:
          type: integer
          format: int64
        sha256:
          type: string
        status:
          type: string
          example: completed
        completed_at:
          type: string
          format: date-time
          nullable: true
    CreateBackupSnapshotRequest:
      type: object
      properties:
        storage_path:
          type: string
          description: Optional local backup directory. Defaults to server backup storage configuration.
        retention_count:
          type: integer
          description: Optional count of newest snapshots to retain for this organization.
    Account:
      type: object
      required: [id, organization_id, name, code, type, is_active]
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
          nullable: true
        code:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [asset, liability, equity, income, expense]
        subtype:
          type: string
          example: bank
        currency:
          type: string
          example: USD
        is_active:
          type: boolean
    CreateAccountRequest:
      type: object
      required: [code, name, type]
      properties:
        parent_id:
          type: string
          format: uuid
          nullable: true
        code:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [asset, liability, equity, income, expense]
        subtype:
          type: string
        currency:
          type: string
    JournalTransaction:
      type: object
      required: [id, organization_id, transaction_date, status, splits]
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        transaction_date:
          type: string
          format: date
        memo:
          type: string
        source_module:
          type: string
          enum: [manual, invoice, credit_note, bill, expense, payroll, import, closing, payment]
        status:
          type: string
          enum: [draft, posted, reversed]
        splits:
          type: array
          items:
            $ref: '#/components/schemas/LedgerSplit'
    AccountDrilldownReport:
      type: object
      required: [account_id, account_code, account_name, account_type, from_date, to_date, opening_balance_minor, closing_balance_minor, rows]
      properties:
        account_id:
          type: string
          format: uuid
        account_code:
          type: string
        account_name:
          type: string
        account_type:
          type: string
          enum: [asset, liability, equity, income, expense]
        from_date:
          type: string
          format: date
        to_date:
          type: string
          format: date
        opening_balance_minor:
          type: integer
          format: int64
        closing_balance_minor:
          type: integer
          format: int64
        rows:
          type: array
          items:
            $ref: '#/components/schemas/AccountDrilldownRow'
    AccountDrilldownRow:
      type: object
      required: [ledger_split_id, journal_transaction_id, transaction_date, source_module, debit_minor, credit_minor, balance_minor, currency, cleared, reconciled]
      properties:
        ledger_split_id:
          type: string
          format: uuid
        journal_transaction_id:
          type: string
          format: uuid
        transaction_date:
          type: string
          format: date
        source_module:
          type: string
          enum: [manual, invoice, credit_note, bill, expense, payroll, import, closing, payment]
        source_document_type:
          type: string
          description: Originating business document type when the journal transaction can be resolved.
          enum: [invoice, credit_note, customer_payment, expense, bill, vendor_payment, payroll_run]
        source_document_id:
          type: string
          format: uuid
          description: Originating business document ID when available.
        source_document_number:
          type: string
          description: Human-readable originating document number when available.
        transaction_memo:
          type: string
        split_memo:
          type: string
        debit_minor:
          type: integer
          format: int64
        credit_minor:
          type: integer
          format: int64
        balance_minor:
          type: integer
          format: int64
        currency:
          type: string
        cleared:
          type: boolean
        reconciled:
          type: boolean
    LedgerSplit:
      type: object
      required: [id, account_id, debit, credit]
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        memo:
          type: string
        debit:
          type: string
          deprecated: true
          example: '100.00'
        credit:
          type: string
          deprecated: true
          example: '0.00'
        debit_minor:
          type: integer
          format: int64
          example: 10000
        credit_minor:
          type: integer
          format: int64
          example: 0
        base_debit_minor:
          type: integer
          format: int64
          example: 835000
        base_credit_minor:
          type: integer
          format: int64
          example: 0
        currency:
          type: string
          example: USD
        exchange_rate_numerator:
          type: integer
          format: int64
          example: 8350
        exchange_rate_denominator:
          type: integer
          format: int64
          example: 100
        cleared:
          type: boolean
        reconciled:
          type: boolean
        reconciled_at:
          type: string
          format: date-time
          nullable: true
    PostJournalTransactionRequest:
      type: object
      required: [transaction_date, splits]
      properties:
        transaction_date:
          type: string
          format: date
        memo:
          type: string
        source_module:
          type: string
          enum: [manual, invoice, credit_note, bill, expense, payroll, import, closing, payment]
        splits:
          type: array
          minItems: 2
          items:
            type: object
            required: [account_id]
            properties:
              account_id:
                type: string
                format: uuid
              memo:
                type: string
              debit_minor:
                type: integer
                format: int64
                example: 10000
              credit_minor:
                type: integer
                format: int64
                example: 0
              base_debit_minor:
                type: integer
                format: int64
                example: 835000
              base_credit_minor:
                type: integer
                format: int64
                example: 0
              currency:
                type: string
                example: USD
              exchange_rate_numerator:
                type: integer
                format: int64
                example: 8350
              exchange_rate_denominator:
                type: integer
                format: int64
                example: 100
    Customer:
      type: object
      required: [id, organization_id, display_name, is_active]
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        display_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        billing_address:
          type: string
        gstin:
          type: string
        is_active:
          type: boolean
    CreateCustomerRequest:
      type: object
      required: [display_name]
      properties:
        display_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        billing_address:
          type: string
        gstin:
          type: string
    Invoice:
