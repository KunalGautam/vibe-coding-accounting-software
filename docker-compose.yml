services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-accounting}
      MYSQL_USER: ${MYSQL_USER:-accounting}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-accounting_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-accounting_root_password}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"

  migrate:
    build:
      context: ./backend
    command: ["/app/migrate", "-direction=up"]
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_DRIVER: mysql
      MYSQL_DSN: ${MYSQL_DSN:-accounting:accounting_dev_password@tcp(mysql:3306)/accounting?parseTime=true&charset=utf8mb4&loc=UTC}

  api:
    build:
      context: ./backend
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: ${APP_ENV:-production}
      API_ADDR: :8080
      DATABASE_DRIVER: mysql
      MYSQL_DSN: ${MYSQL_DSN:-accounting:accounting_dev_password@tcp(mysql:3306)/accounting?parseTime=true&charset=utf8mb4&loc=UTC}
      AUTO_MIGRATE: "false"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:?set MFA_ENCRYPTION_KEY}
      EMAIL_DELIVERY_ENABLED: ${EMAIL_DELIVERY_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      PASSWORD_RESET_BASE_URL: ${PASSWORD_RESET_BASE_URL:-http://localhost:3000/reset-password}
      INVITATION_BASE_URL: ${INVITATION_BASE_URL:-http://localhost:3000/login}
      EXPOSE_PASSWORD_RESET_TOKEN: ${EXPOSE_PASSWORD_RESET_TOKEN:-false}
      SELF_SERVICE_REGISTRATION_ENABLED: ${SELF_SERVICE_REGISTRATION_ENABLED:-false}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-20}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      ATTACHMENT_STORAGE_PATH: /app/storage/attachments
      BACKUP_STORAGE_PATH: /app/storage/backups
    volumes:
      - app_storage:/app/storage
    ports:
      - "${API_PORT:-8080}:8080"

  worker:
    build:
      context: ./backend
    command: ["/app/worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_DRIVER: mysql
      MYSQL_DSN: ${MYSQL_DSN:-accounting:accounting_dev_password@tcp(mysql:3306)/accounting?parseTime=true&charset=utf8mb4&loc=UTC}
      AUTO_MIGRATE: "false"
      EMAIL_DELIVERY_ENABLED: ${EMAIL_DELIVERY_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      PASSWORD_RESET_BASE_URL: ${PASSWORD_RESET_BASE_URL:-http://localhost:3000/reset-password}
      BACKUP_STORAGE_PATH: /app/storage/backups
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-14}
      WORKER_INTERVAL_SECONDS: ${WORKER_INTERVAL_SECONDS:-3600}
      MARKET_DATA_IMPORT_ENABLED: ${MARKET_DATA_IMPORT_ENABLED:-false}
      MARKET_DATA_IMPORT_PATH: ${MARKET_DATA_IMPORT_PATH:-/app/storage/market-data/amfi.txt}
      MARKET_DATA_IMPORT_URL: ${MARKET_DATA_IMPORT_URL:-}
      MARKET_DATA_BEARER_TOKEN: ${MARKET_DATA_BEARER_TOKEN:-}
      MARKET_DATA_TIMEOUT_SECONDS: ${MARKET_DATA_TIMEOUT_SECONDS:-30}
      MARKET_DATA_IMPORT_FORMAT: ${MARKET_DATA_IMPORT_FORMAT:-amfi}
      MARKET_DATA_SYMBOL_MODE: ${MARKET_DATA_SYMBOL_MODE:-scheme_code}
      MARKET_DATA_SOURCE: ${MARKET_DATA_SOURCE:-scheduled_market_data}
      MARKET_DATA_SYMBOL: ${MARKET_DATA_SYMBOL:-}
      MARKET_DATA_ORGANIZATION_ID: ${MARKET_DATA_ORGANIZATION_ID:-}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - app_storage:/app/storage

  web:
    build:
      context: ./web
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:80"

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["monitoring"]
    depends_on:
      - api
      - alertmanager
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/accounting-alerts.yml:/etc/prometheus/rules/accounting-alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles: ["monitoring"]
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --config.expand-env
      - --storage.path=/alertmanager
    environment:
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-ops@example.com}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-accounting-alerts@example.com}
      ALERT_SMTP_HOST: ${ALERT_SMTP_HOST:-smtp.example.com}
      ALERT_SMTP_PORT: ${ALERT_SMTP_PORT:-587}
      ALERT_SMTP_USERNAME: ${ALERT_SMTP_USERNAME:-}
      ALERT_SMTP_PASSWORD: ${ALERT_SMTP_PASSWORD:-}
    volumes:
      - ./ops/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"

  grafana:
    image: grafana/grafana:11.4.0
    profiles: ["monitoring"]
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/accounting-overview-dashboard.json:/var/lib/grafana/dashboards/accounting-overview-dashboard.json:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"

volumes:
  mysql_data:
  app_storage:
  prometheus_data:
  alertmanager_data:
  grafana_data:
